# 20260305 박현식
# Pinlm 서비스 통합 실행 설정
version: '3.8'

services:
  db:
    image: postgres:16
    container_name: PINLM_DB
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-gookbob}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gookbob}
      POSTGRES_DB: ${DB_NAME:-ssag_algo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: PINLM_BACK
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/back
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - TMDB_API_KEY=${TMDB_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data: